# Mappings

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind 'C-h'

set-option -g mouse off

# Set the terminal (Alacritty) window title to the current folder.
# Without set-titles on, tmux never updates the title and Alacritty shows "tmux".
set-option -g set-titles on
set-option -g set-titles-string '#{b:pane_current_path}'

# mappings to use vim to scroll and yank to system clipboard
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# tms mappings
bind C-o display-popup -E "tms"
bind C-j display-popup -E "tms switch"
bind C-w display-popup -E "tms windows"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
# Restore Claude Code panes via the claude-resume wrapper (~/.local/bin/claude-resume).
# It resumes the conversation, and if the last turn was interrupted (e.g. restart
# mid-work) it also re-sends the message you'd typed. (inline strategy: match a
# pane running `claude`, relaunch it as `claude-resume`.)
set -g @resurrect-processes '"~claude->claude-resume"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

run '~/.config/tmux/plugins/tpm/tpm'


# Impaneding — opt-in auto-clear-on-view. Clears a pending pane when you navigate to it,
# across all three navigation events. Guarded (if-shell) so re-sourcing never stacks
# duplicates; -ga appends so other plugins' hooks are preserved.
# Only wire up if the binary is present — it's a local build, not a brew package,
# so a fresh machine silently skips it instead of erroring on every nav.
if-shell -b '[ -x /opt/homebrew/bin/impaneding ]' {
  if-shell -b '! tmux show-hooks -g window-pane-changed | grep -q "/opt/homebrew/bin/impaneding seen"' {
    set-hook -ga window-pane-changed 'run-shell -b "/opt/homebrew/bin/impaneding seen"'
  }
  if-shell -b '! tmux show-hooks -g session-window-changed | grep -q "/opt/homebrew/bin/impaneding seen"' {
    set-hook -ga session-window-changed 'run-shell -b "/opt/homebrew/bin/impaneding seen"'
  }
  if-shell -b '! tmux show-hooks -g client-session-changed | grep -q "/opt/homebrew/bin/impaneding seen"' {
    set-hook -ga client-session-changed 'run-shell -b "/opt/homebrew/bin/impaneding seen"'
  }
}
